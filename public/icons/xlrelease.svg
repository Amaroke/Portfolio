<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Blue circle background -->
  <circle cx="50" cy="50" r="48" fill="#29ABE2"/>

  <!-- 6 solid white arrows pointing outward, 60° apart -->
  <!-- Each arm: triangle arrowhead + rectangular stem -->
  <!-- Coordinates designed for "up" arm, rotated around center (50,50) -->
  <g fill="white">
    <!-- 0° - up -->
    <g transform="rotate(0 50 50)">
      <polygon points="50,15 38,36 62,36"/>
      <rect x="45" y="36" width="10" height="14" rx="1"/>
    </g>
    <!-- 60° - upper-right -->
    <g transform="rotate(60 50 50)">
      <polygon points="50,15 38,36 62,36"/>
      <rect x="45" y="36" width="10" height="14" rx="1"/>
    </g>
    <!-- 120° - lower-right -->
    <g transform="rotate(120 50 50)">
      <polygon points="50,15 38,36 62,36"/>
      <rect x="45" y="36" width="10" height="14" rx="1"/>
    </g>
    <!-- 180° - down -->
    <g transform="rotate(180 50 50)">
      <polygon points="50,15 38,36 62,36"/>
      <rect x="45" y="36" width="10" height="14" rx="1"/>
    </g>
    <!-- 240° - lower-left -->
    <g transform="rotate(240 50 50)">
      <polygon points="50,15 38,36 62,36"/>
      <rect x="45" y="36" width="10" height="14" rx="1"/>
    </g>
    <!-- 300° - upper-left -->
    <g transform="rotate(300 50 50)">
      <polygon points="50,15 38,36 62,36"/>
      <rect x="45" y="36" width="10" height="14" rx="1"/>
    </g>
  </g>
</svg>
